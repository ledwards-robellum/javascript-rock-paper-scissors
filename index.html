<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main-container">
    <div class="vertical container">
      <h1 id="title">Rock, Paper, Scissors</h1>
      <h2 id="round-result">Make a move to start!</h2>

      <div class="half">
        <button class="choice-button" onclick="playGame('rock')">✊ Rock</button>
        <button class="choice-button" onclick="playGame('paper')">✋ Paper</button>
        <button class="choice-button" onclick="playGame('scissors')">✌ Scissors</button>
        <input id="round-max-input" placeholder="Max Rounds (Int)">
        <button>Enter</button>
      </div>
    </div>
    <div class="horizontal container">
      <h3>Your Choice: <span id="player-choice">-</span></h3>
      <h3>Computer's Choice: <span id="computer-choice">-</span></h3>
    </div>
    <div class="horizontal container">
      <div class="box">
        Placeholder for Image
      </div>
      <div class="box">
        Placeholder for Image
      </div>
    </div>
    <div class="horizontal container">
      <h3>Your Score: <span id="player-score">0</span></h3> 
      <h3>Computer Score: <span id="computer-score">0</span></h3> 
    </div>
    <div class="vertical container">
      <h2 id="round-count">Round: 0</h2>
      <h3 id="round-max">Max Rounds: 5</h3>
      <button onclick="restartGame()">Restart</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
